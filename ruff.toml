line-length = 88
target-version = "py311"

# Rules to enable
[lint]
extend-select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "N",      # pep8-naming
    "UP",     # pyupgrade
]

# Rules to ignore
ignore = [
    "E501",   # line too long (Black handles this)
]

# Exclude paths
exclude = [
    ".git",
    "__pycache__",
    ".venv",
    "venv",
    "dbt_packages",
    ".dbt",
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]  # Unused imports in __init__.py are acceptable
