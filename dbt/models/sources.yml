version: 2

sources:
  - name: raw
    schema: public
    description: Raw data from external sources
    tables:
      - name: prices
        description: Raw price data from yfinance
        columns:
          - name: symbol
            description: Stock symbol
          - name: timestamp
            description: Price timestamp
          - name: open
            description: Opening price
          - name: high
            description: Highest price in period
          - name: low
            description: Lowest price in period
          - name: close
            description: Closing price
          - name: volume
            description: Trading volume
      - name: instruments
        description: Master registry of all tracked instruments
        columns:
          - name: symbol
          - name: name
          - name: instrument_type
          - name: exchange
          - name: is_active
      - name: ingestion_log
        description: Audit trail of all ingestions
        columns:
          - name: id
          - name: symbol
          - name: ingestion_type
          - name: status
          - name: rows_ingested
